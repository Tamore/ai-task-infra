apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ai-tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: ai-tasks-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ai-tasks
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000
---
