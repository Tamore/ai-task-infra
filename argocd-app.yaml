apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-tasks-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Tamore/ai-task-infra.git'
    targetRevision: main
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-tasks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
